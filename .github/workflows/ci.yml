# Executa a demonstração da biblioteca contra um MongoDB real a cada push.
name: CI

on: [push, workflow_dispatch]

jobs:
  demo:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Instalar dependências
        run: npm install
      - name: Executar demonstração (casos de uso + casos de erro)
        run: npm run demo
        env:
          MONGO_URI: mongodb://localhost:27017
      - name: Verificar arquivo de log de exceções
        run: |
          test -s logs/erros.log
          echo "=== logs/erros.log ==="
          cat logs/erros.log
