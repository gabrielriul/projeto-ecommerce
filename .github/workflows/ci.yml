# Testes da API (banco simulado) + smoke test contra MongoDB real.
name: CI

on: [push, workflow_dispatch]

jobs:
  testes:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Instalar dependências
        run: npm install
      - name: Testes da API (node:test, banco simulado)
        run: npm test
      - name: Smoke test contra MongoDB real
        run: bash test/smoke.sh
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DB: ecommerce_smoke
